version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: alpha_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: alpha_detector
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha -d alpha_detector"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: alpha_api
    restart: unless-stopped
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - DATABASE_URL=postgresql://alpha:alpha_secret@db:5432/alpha_detector
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./config:/app/config
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── NLP Worker ──────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: alpha_worker
    restart: unless-stopped
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - DATABASE_URL=postgresql://alpha:alpha_secret@db:5432/alpha_detector
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      db:
        condition: service_healthy
    command: python -m src.ingestion.scheduler

  # ── React Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: alpha_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data: