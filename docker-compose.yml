version: "3.9"

services:
  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: alphalens_api
    restart: unless-stopped
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src          # live reload your source
      - ./data:/app/data        # your CSV files + model
      - ./config:/app/config
    ports:
      - "8000:8000"
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: alphalens_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - api